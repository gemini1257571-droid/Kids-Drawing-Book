    <style>
        body { background-color: #0f0f0f; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .flip-book { width: 1400px; height: 900px; box-shadow: 0 0 100px rgba(0,0,0,1); display: none; }
        
        .page { background-color: #ffffff; overflow: hidden; position: relative; border-left: 1px solid #f0f0f0; }
        
        .cover-page { 
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            display: flex; justify-content: center; align-items: center;
        }
        .cover-img { 
            width: 95%; height: 95%; 
            object-fit: contain; 
            position: relative; 
        }
        
        .blank-page { background-color: #f9f9f9; }

        /* --- Internal B&W Styling --- */
        .main-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 5%; left: 0; transform-origin: center; }
        
        /* Standard Zoom for 42 pages */
        .zoom-standard { transform: scale(1.25); }
        
        /* Special Zoom for Image 43 (The Blimp) */
        .zoom-extra { transform: scale(1.6); top: 0; } /* Increased scale and adjusted top to keep it centered */

        .ref-box { position: absolute; top: 30px; right: 30px; width: 240px; height: 170px; border: 4px solid #333; border-radius: 15px; overflow: hidden; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); z-index: 20; background: white; }
        .ref-img { width: 100%; height: 100%; object-fit: contain; }
        .palette-container { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 25; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #333; box-shadow: 3px 3px 8px rgba(0,0,0,0.2); }
    </style>
</head>

        document.addEventListener('DOMContentLoaded', function() {
            const flipBook = document.getElementById('flipbook');
            flipBook.style.display = 'block';
            const pageFlip = new St.PageFlip(flipBook, {
                width: 700, height: 900, size: "stretch", 
                showCover: true, 
                maxShadowOpacity: 0.5, mobileScrollSupport: true
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            const flipSound = new Audio('flip.wav');
            pageFlip.on('flip', (e) => { flipSound.currentTime = 0; flipSound.play().catch(err => {}); });
        });
